<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Base Background -->
  <rect width="512" height="512" rx="112" fill="#2C1E16"/>
  
  <!-- Outer Connectors -->
  <path d="M 24 256 H 116" fill="none" stroke="#D4A373" stroke-width="12" stroke-linecap="round"/>
  <circle cx="70" cy="256" r="8" fill="#D4A373"/>
  <path d="M 396 256 H 488" fill="none" stroke="#D4A373" stroke-width="12" stroke-linecap="round"/>
  <circle cx="442" cy="256" r="8" fill="#D4A373"/>

  <!-- The Pill Bean Body -->
  <rect x="116" y="80" width="280" height="352" rx="140" fill="#432818" stroke="#D4A373" stroke-width="20"/>

  <!-- The S-Crack Eraser (Splits the bean using background color) -->
  <path d="M 256 24 V 136 L 216 176 V 216 L 296 296 V 336 L 256 376 V 488" fill="none" stroke="#2C1E16" stroke-width="28" stroke-linejoin="round"/>

  <!-- The Glowing S-Crack Circuit Trace -->
  <path d="M 256 24 V 136 L 216 176 V 216 L 296 296 V 336 L 256 376 V 488" fill="none" stroke="#FFE6A7" stroke-width="8" stroke-linejoin="round"/>

  <!-- Circuit Nodes along the trace -->
  <circle cx="256" cy="136" r="8" fill="#FFE6A7"/>
  <circle cx="216" cy="176" r="8" fill="#FFE6A7"/>
  <circle cx="216" cy="216" r="8" fill="#FFE6A7"/>
  <circle cx="256" cy="256" r="12" fill="#FFE6A7"/> <!-- Core Center Node -->
  <circle cx="296" cy="296" r="8" fill="#FFE6A7"/>
  <circle cx="296" cy="336" r="8" fill="#FFE6A7"/>
  <circle cx="256" cy="376" r="8" fill="#FFE6A7"/>

  <!-- Golden Outer Border (Drawn last to overlay perfectly) -->
  <rect x="24" y="24" width="464" height="464" rx="88" fill="none" stroke="#8B5A2B" stroke-width="12"/>
</svg>
